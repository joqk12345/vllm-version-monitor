name: Release Report
on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11", cache: pip}
      - run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - run: python -m pip install -e '.[dev]'
      - name: Compile Python modules
        run: python -m compileall -q agent src
      - name: Run tests
        run: pytest -q
      - run: release-report build --config config/vllm.yaml
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - run: release-report build --config config/sglang.yaml
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - uses: actions/upload-artifact@v4
        with: {name: release-intelligence-reports, path: output/}
