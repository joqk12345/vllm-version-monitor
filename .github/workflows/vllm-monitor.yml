name: Daily Release Intelligence Reports

on:
  schedule:
    - cron: "0 0 * * *"  # 每天 UTC 时间 0 点运行
  workflow_dispatch:  # 允许手动触发

jobs:
  reports:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
          sudo apt-get update
          sudo apt-get install -y poppler-utils
      - name: Compile Python modules
        run: python -m compileall -q agent src
      - name: Test
        run: python -m pytest -q
      - name: Create run identifier
        id: run
        run: echo "id=$(date -u +%Y-%m-%dT%H-%M-%SZ)" >> "$GITHUB_OUTPUT"
      - name: Build vLLM reports
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: release-report build --config config/vllm.yaml --run-id "${{ steps.run.outputs.id }}"
      - name: Build SGLang reports
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: release-report build --config config/sglang.yaml --run-id "${{ steps.run.outputs.id }}"
      - name: Validate manifests
        run: |
          test -f "output/vllm/runs/${{ steps.run.outputs.id }}/build_manifest.json"
          test -f "output/sglang/runs/${{ steps.run.outputs.id }}/build_manifest.json"
          test -f "output/vllm/runs/${{ steps.run.outputs.id }}/qa/verification.json"
          test -f "output/sglang/runs/${{ steps.run.outputs.id }}/qa/verification.json"
      - uses: actions/upload-artifact@v4
        with:
          name: daily-release-intelligence-${{ steps.run.outputs.id }}
          path: output/
          retention-days: 365
