name: Daily Release Intelligence Reports

on:
  schedule:
    - cron: "0 0 * * *"  # 每天 UTC 时间 0 点运行
  workflow_dispatch:  # 允许手动触发

jobs:
  reports:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
          sudo apt-get update
          sudo apt-get install -y poppler-utils
      - name: Compile Python modules
        run: python -m compileall -q agent src
      - name: Test
        run: python -m pytest -q
      - name: Build vLLM reports
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: release-report build --config config/vllm.yaml
      - name: Build SGLang reports
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: release-report build --config config/sglang.yaml
      - name: Validate manifests
        run: |
          test -f output/vllm/build_manifest.json
          test -f output/sglang/build_manifest.json
          test -f output/vllm/qa/verification.json
          test -f output/sglang/qa/verification.json
      - uses: actions/upload-artifact@v4
        with:
          name: daily-release-intelligence-reports
          path: output/
